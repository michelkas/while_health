<!-- templates/artisan/includes/header.html -->
{% load static %}
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container">
<a class="navbar-brand d-flex align-items-left " href="{% url 'data:index' %}">
            <span class="fw-bold">MediTrust</span>
        </a>

        <div class="collapse navbar-collapse " id="navbarNav">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'data:index' %}">
                 Accueil
                    </a>
                </li>
          
            </ul>
        </div>

        
        <div class="d-flex align-items-center ms-auto gap-2">
            <a class="btn btn-appointment" href="{% url 'patients:appointment' %}">Prendre rendez-vous</a>
            {% if user.is_authenticated %}
                <a class="btn btn-outline-secondary" href="{% url 'profile' %}">Mon profil</a>
                <a class="btn btn-outline-dark" href="{% url 'logout' %}">Se déconnecter</a>
            {% else %}
                <a class="btn btn-outline-dark" href="{% url 'login' %}">Connexion</a>
                <a class="btn btn-outline-secondary" href="{% url 'register' %}">Inscription</a>
            {% endif %}
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </div>
</nav>
